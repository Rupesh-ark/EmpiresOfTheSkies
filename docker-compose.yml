services:
  postgres:
    image: postgres:16-alpine
    container_name: eots-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: eots
      POSTGRES_PASSWORD: eots
      POSTGRES_DB: eots
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - eots_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eots"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  eots_pg_data:
