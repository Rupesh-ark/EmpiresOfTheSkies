services:
  postgres:
    image: postgres:16-alpine
    container_name: eots-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: eots
      POSTGRES_PASSWORD: eots
      POSTGRES_DB: eots
    ports:
      - "5432:5432"
    volumes:
      - eots_pg_data:/var/lib/postgresql/data

volumes:
  eots_pg_data:
